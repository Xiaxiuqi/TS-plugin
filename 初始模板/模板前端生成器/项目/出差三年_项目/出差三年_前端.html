<script>
// ==========================================
// 1. API Definition (Standard Boilerplate)
// ==========================================
const dataSourceAPI = (typeof parent !== 'undefined' && parent.AutoCardUpdaterAPI) ? parent.AutoCardUpdaterAPI : {
    exportTableAsJson: function() { console.warn("No API found, using test data."); return null; },
    registerTableUpdateCallback: function(cb) { console.warn("No API found, no callbacks."); }
};

function sendGameActionRequest(msg) {
    console.log("Action sent:", msg);
    if (typeof parent.triggerSlash === 'function') {
        try { parent.triggerSlash('/setinput ' + msg); } 
        catch(e) { console.error(e); }
    } else {
        const input = parent.document.getElementById('send_textarea');
        if (input) { input.value = msg; } 
        else { alert(`[模拟发送] ${msg}`); }
    }
}

// ==========================================
// 2. Data Processing
// ==========================================
function processJsonData(json) {
    if (!json) return null;
    const tables = {};
    for (const sheetId in json) {
        if (Object.prototype.hasOwnProperty.call(json, sheetId) && json[sheetId] && json[sheetId].name) {
            const sheet = json[sheetId];
            tables[sheet.name] = {
                headers: sheet.content[0] || [],
                rows: sheet.content.slice(1)
            };
        }
    }
    return tables;
}

const getVal = (row, headers, colName) => {
    if(!row || !headers) return null;
    const idx = headers.indexOf(colName);
    return idx !== -1 ? row[idx] : null;
};

// ==========================================
// 3. Rendering Logic
// ==========================================

// Render Global Status
function renderGlobal(table) {
    if (!table || !table.rows[0]) return;
    const row = table.rows[0];
    const headers = table.headers;

    document.getElementById('map-location-name').textContent = getVal(row, headers, '地图标题') || '未知区域';
    document.getElementById('sys-time').textContent = getVal(row, headers, '当前时间') || '00:00';
    
    // 外部区域 (虽然设计文档没重点提，但保留功能)
    // const extAreas = getVal(row, headers, '外部区域列表');
}

// Render Protagonist (Sanity/Suspicion + Options)
function renderProtagonist(table) {
    if (!table || !table.rows[0]) return;
    const row = table.rows[0];
    const headers = table.headers;

    // Stats
    const sanity = parseInt(getVal(row, headers, '理智值') || 100);
    const suspicion = parseInt(getVal(row, headers, '怀疑度') || 0);
    const curLoc = getVal(row, headers, '当前位置');

    document.getElementById('val-sanity').textContent = sanity + '%';
    document.getElementById('bar-sanity').style.width = sanity + '%';
    
    document.getElementById('val-suspicion').textContent = suspicion + '%';
    document.getElementById('bar-suspicion').style.width = suspicion + '%';

    // Visual Effects based on Sanity
    const mainUI = document.getElementById('main-ui');
    if (sanity < 30) {
        mainUI.style.animation = 'shake 0.5s infinite';
        document.documentElement.style.setProperty('--accent-safe', '#888'); 
    } else {
        mainUI.style.animation = 'none';
        document.documentElement.style.setProperty('--accent-safe', '#41a5ea');
    }

    // Buttons
    const btnContainer = document.getElementById('action-buttons');
    btnContainer.innerHTML = '';
    
    const options = [
        getVal(row, headers, '选项一'),
        getVal(row, headers, '选项二'),
        getVal(row, headers, '选项三'),
        getVal(row, headers, '选项四')
    ];

    options.forEach(opt => {
        if (opt) {
            const btn = document.createElement('button');
            btn.className = 'cmd-btn';
            if (opt.includes('强行') || opt.includes('攻击') || opt.includes('揭穿')) {
                btn.classList.add('danger');
            }
            btn.textContent = opt;
            btn.onclick = () => sendGameActionRequest(opt);
            btnContainer.appendChild(btn);
        }
    });

    return curLoc; // Return current location for map rendering
}

// Render Map (Rooms & Elements)
function renderMap(roomTable, elemTable, charLocs) {
    const svg = document.getElementById('house-map-svg');
    svg.innerHTML = ''; // Clear

    if (!roomTable || !roomTable.rows) {
        svg.innerHTML = '<text x="400" y="300" fill="#666" text-anchor="middle">NO SIGNAL</text>';
        return;
    }

    // 1. Draw Rooms
    roomTable.rows.forEach(row => {
        const name = getVal(row, roomTable.headers, '地点名称');
        const x = getVal(row, roomTable.headers, 'X坐标');
        const y = getVal(row, roomTable.headers, 'Y坐标');
        const w = getVal(row, roomTable.headers, '宽度');
        const h = getVal(row, roomTable.headers, '高度');

        if (name && x && y && w && h) {
            const g = document.createElementNS("http://www.w3.org/2000/svg", 'g');
            g.onclick = () => sendGameActionRequest(`前往 ${name}`);
            
            const rect = document.createElementNS("http://www.w3.org/2000/svg", 'rect');
            rect.setAttribute('x', x); rect.setAttribute('y', y);
            rect.setAttribute('width', w); rect.setAttribute('height', h);
            rect.setAttribute('class', 'room-rect');
            
            // Check for anomalies (using Suspicion or specific flags could be better, but keeping simple)
            // Here we just check if any "corrupted" char is in the room (simulated logic)
            
            const text = document.createElementNS("http://www.w3.org/2000/svg", 'text');
            text.setAttribute('x', parseInt(x) + parseInt(w)/2);
            text.setAttribute('y', parseInt(y) + parseInt(h)/2);
            text.setAttribute('class', 'room-label');
            text.textContent = name;

            g.appendChild(rect);
            g.appendChild(text);
            svg.appendChild(g);
        }
    });

    // 2. Draw Characters (Icons)
    // charLocs format: { "Name": "RoomName" }
    Object.keys(charLocs).forEach(charName => {
        const locName = charLocs[charName];
        // Find room coords
        const roomRow = roomTable.rows.find(r => getVal(r, roomTable.headers, '地点名称') === locName);
        if (roomRow) {
            const rx = parseInt(getVal(roomRow, roomTable.headers, 'X坐标'));
            const ry = parseInt(getVal(roomRow, roomTable.headers, 'Y坐标'));
            const rw = parseInt(getVal(roomRow, roomTable.headers, '宽度'));
            const rh = parseInt(getVal(roomRow, roomTable.headers, '高度'));

            // Random offset within room to prevent overlap
            const ox = rx + 20 + Math.random() * (rw - 40);
            const oy = ry + 20 + Math.random() * (rh - 40);

            const iconGroup = document.createElementNS("http://www.w3.org/2000/svg", 'text');
            iconGroup.setAttribute('x', ox);
            iconGroup.setAttribute('y', oy);
            iconGroup.setAttribute('class', 'char-icon');
            
            if (charName === '主角' || charName === '我') iconGroup.textContent = '🕵️';
            else if (charName.includes('苏婉') || charName.includes('妻')) iconGroup.textContent = '👩';
            else if (charName.includes('李悦') || charName.includes('女')) iconGroup.textContent = '👧';
            else iconGroup.textContent = '👤';

            svg.appendChild(iconGroup);
        }
    });
}

// Render NPCs
function renderNPCs(table, pLoc) {
    const container = document.getElementById('npc-container');
    container.innerHTML = '';
    const charLocs = {}; // Store locations for map

    if (!table || !table.rows) return {};

    table.rows.forEach(row => {
        const name = getVal(row, table.headers, '姓名');
        const status = getVal(row, table.headers, '当前状态') || '未知';
        const loc = getVal(row, table.headers, '所在地点');
        const corruption = parseInt(getVal(row, table.headers, '堕落度') || 0);

        charLocs[name] = loc;

        const card = document.createElement('div');
        card.className = 'target-card';
        if (corruption > 80) card.classList.add('corrupted');

        // Avatar char
        const charInitial = name ? name[0] : '?';
        
        let statusClass = 'target-status';
        if (status.includes('暴露') || status.includes('本性') || status.includes('淫')) statusClass += ' exposed';

        card.innerHTML = `
            <div class="target-avatar">
                ${charInitial}
                <div class="corruption-ring" style="opacity: ${corruption/100}; animation-duration: ${100/(corruption+1)}s"></div>
            </div>
            <div class="target-info">
                <div class="target-name">
                    <span>${name}</span>
                    <span style="color: #666; font-size: 0.8em;">COR: ${corruption}%</span>
                </div>
                <div class="${statusClass}">STATUS: ${status}</div>
                <div style="color: #666; font-size: 0.8em; margin-top: 2px;">LOC: ${loc}</div>
            </div>
        `;
        
        container.appendChild(card);
    });

    return charLocs;
}

// Render Trace Log (Anomalies)
function renderTraces(table) {
    const container = document.getElementById('trace-log');
    if (!table || !table.rows) return;

    container.innerHTML = '';
    table.rows.forEach(row => {
        const name = getVal(row, table.headers, '痕迹名称');
        const type = getVal(row, table.headers, '类型');
        const desc = getVal(row, table.headers, '描述');
        
        const div = document.createElement('div');
        div.className = 'trace-item';
        div.innerHTML = `<b>[${type}]</b> ${name}: ${desc}`;
        div.onclick = () => sendGameActionRequest(`调查 ${name}`);
        container.appendChild(div);
    });
}

// Main Render Loop
function renderUI(tables) {
    if (!tables) return;
    
    renderGlobal(tables['全局监控数据']);
    
    // Render Protagonist & Get Location
    const pLoc = renderProtagonist(tables['主角信息']); // Note: In design doc, protagonist is in '主角信息' or '家庭成员状态'
    
    // Render NPCs & Get Locations
    // Note: In design doc, we proposed merging, but if separate:
    const charLocs = renderNPCs(tables['重要人物表'], pLoc);
    if (pLoc) charLocs['主角'] = pLoc;

    // Render Map
    renderMap(tables['主要地点表'], tables['地图元素表'], charLocs); // '地图元素表' here maps to '可疑痕迹表' logic if using old structure, or new one

    // Render Traces (Anomalies)
    // Assuming '可疑痕迹表' or mapping '地图元素表' to logs
    const traceTable = tables['可疑痕迹表'] || tables['地图元素表'];
    renderTraces(traceTable);
}

// ==========================================
// 4. Initialization
// ==========================================
window.onload = function() {
    const rawData = dataSourceAPI.exportTableAsJson();
    if (rawData) {
        const initialTables = processJsonData(rawData);
        renderUI(initialTables);
    }

    dataSourceAPI.registerTableUpdateCallback(function(newData) {
        console.log("Detected data update, refreshing UI...");
        const updatedTables = processJsonData(newData);
        renderUI(updatedTables);
    });
};

</script>
