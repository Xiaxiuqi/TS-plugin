name: validate

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch: {}

jobs:
  validate:
    name: schema + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run schema validation
        run: node scripts/validate-examples.js

      - name: Run cross-reference check
        run: node scripts/check-api-references.js

      - name: Run test runner
        run: node tests/run.js
