    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Serif SC', 'Source Han Serif SC', serif;
      background: #f0ebe3;
      padding: 20px;
      min-height: 100vh;
    }
    body.night {
      background: #141418;
    }
    .preview-controls {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 999;
      display: flex;
      gap: 8px;
    }
    .preview-controls button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      background: #a07e74;
      color: #fff;
      transition: all 0.2s;
    }
    .preview-controls button:hover { opacity: 0.85; }
    .preview-controls button.active { background: #5a7a8f; }
    .preview-title {
      text-align: center;
      color: #756b60;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }
    body.night .preview-title { color: #9a9488; }
  </style>
  <link rel="stylesheet" href="modules/bp-panel-newvars/style.css">
</head>
<body>
  <div class="preview-controls">
    <button onclick="toggleTheme()" id="themeBtn">切换夜间模式</button>

    // Mock StoryRegexUI DOM helper
    window.StoryRegexUI = window.StoryRegexUI || {};
    window.StoryRegexUI.dom = {
      escapeHtml(value) {
        const div = document.createElement('div');
        div.textContent = String(value ?? '');
        return div.innerHTML;
      },
      createElement(tag, options = {}) {
        const el = document.createElement(tag);
        if (options.className) el.className = options.className;
        if (options.html) el.innerHTML = options.html;
        return el;
      }
    };
    window.StoryRegexUI.theme = {
      getTheme() { return document.body.classList.contains('night') ? 'night' : 'day'; }
    };
    window.StoryRegexUI.registry = {
      register(module) {
        window.__bpModule = module;
        console.log('[Preview] Module registered:', module.id, module.version);
      }
    };
  </script>

    function render(rawText) {
      const module = window.__bpModule;
      if (!module) { console.error('Module not registered'); return; }
      const node = module.renderContent('', { rawText });
      const container = document.getElementById('container');
      container.innerHTML = '';
      if (node) {
        container.appendChild(node);
        module.mount(node);
      } else {
        container.innerHTML = '<div style="text-align:center;color:#a07e74;padding:40px;">No render output. Check console.</div>';
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('night');
      const btn = document.getElementById('themeBtn');
      btn.textContent = document.body.classList.contains('night') ? '切换日间模式' : '切换夜间模式';
      // Re-render with current data
      const current = document.getElementById('container').dataset.mode || 'single';
      render(current === 'multi' ? MULTI_DATA : SINGLE_DATA);
    }

    function showSingle() {
      document.getElementById('container').dataset.mode = 'single';
      render(SINGLE_DATA);
    }

    function showMulti() {
      document.getElementById('container').dataset.mode = 'multi';
      render(MULTI_DATA);
    }

    // Initial render
    showSingle();
  </script>
