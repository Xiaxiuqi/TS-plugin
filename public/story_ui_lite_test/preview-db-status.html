  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Serif SC', 'Source Han Serif SC', serif;
      background: #f0ebe3;
      min-height: 100vh;
    }
    body.night { background: #141418; }
    .preview-layout { display: grid; grid-template-columns: 1fr 360px; gap: 0; min-height: 100vh; }
    .preview-main { padding: 20px; overflow-y: auto; }
    .preview-sidebar { background: #fff; border-left: 1px solid #d0d7de; padding: 12px; overflow-y: auto; font-family: system-ui, sans-serif; font-size: 12px; }
    body.night .preview-sidebar { background: #1c1c22; border-left-color: #333; color: #ccc; }
    .preview-controls {
      position: sticky; top: 0; z-index: 99; background: inherit;
      padding: 8px 0 12px; border-bottom: 1px solid #e0e0e0;
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
    }
    body.night .preview-controls { border-bottom-color: #333; }
    .preview-controls button {
      padding: 5px 12px; border: none; border-radius: 5px; cursor: pointer;
      font-size: 11px; font-weight: 700; background: #a07e74; color: #fff; transition: all 0.2s;
    }
    .preview-controls button:hover { opacity: 0.85; }
    .preview-controls button.active { background: #5a7a8f; }
    .preview-title {
      text-align: center; color: #756b60; font-size: 11px;
      font-weight: 700; letter-spacing: 0.1em; margin-bottom: 16px;
    }
    body.night .preview-title { color: #9a9488; }
    #container { max-width: 800px; margin: 0 auto; }
    .sidebar-section { margin-bottom: 14px; }
    .sidebar-section h3 { font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #555; }
    body.night .sidebar-section h3 { color: #aaa; }
    .sidebar-section pre {
      background: #f6f8fa; border: 1px solid #e1e4e8; border-radius: 4px;
      padding: 8px; font-size: 10px; max-height: 240px; overflow: auto;
      white-space: pre-wrap; word-break: break-all;
    }
    body.night .sidebar-section pre { background: #252530; border-color: #444; color: #ddd; }
    .trace-entry { padding: 3px 0; border-bottom: 1px solid #eee; }
    body.night .trace-entry { border-bottom-color: #333; }
    @media (max-width: 900px) {
      .preview-layout { grid-template-columns: 1fr; }
      .preview-sidebar { border-left: none; border-top: 1px solid #d0d7de; max-height: 50vh; }
    }
    .mock-send-box {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--db-panel, #1d232c);
      border-top: 1px solid var(--db-line, rgba(255, 255, 255, 0.08));
      padding: 8px 12px;
      z-index: 9000;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .mock-send-textarea {
      flex: 1;
      resize: vertical;

      color: var(--db-text, #ede7dc);
      border: 1px solid var(--db-line, rgba(255, 255, 255, 0.08));

      font-size: 13px;

  <script>
    // === API Trace System ===
    const apiTrace = [];
    function traceCall(name, args) {
      const entry = { ts: new Date().toLocaleTimeString(), name, args: Array.from(args || []) };
      apiTrace.push(entry);
      renderTrace();
    }
    function renderTrace() {
      const el = document.getElementById('api-trace');
      if (apiTrace.length === 0) { el.textContent = '暂无调用'; return; }
      el.textContent = apiTrace.map(e => `[${e.ts}] ${e.name}()`).join('\n');
      el.scrollTop = el.scrollHeight;
    }
    function clearTrace() { apiTrace.length = 0; renderTrace(); }
    function showGameState() {
      const gs = window.StoryRegexUI?.dbStatusData?.GameState;
      document.getElementById('game-state').textContent = gs ? JSON.stringify(gs, null, 2) : 'GameState 未初始化';
    }
    function renderDbState(tables) {
      const el = document.getElementById('db-state');
      const summary = {};
      for (const [k, v] of Object.entries(tables)) {
        summary[v.name || k] = (v.content ? v.content.length - 1 : 0) + ' rows';
      }
      el.textContent = JSON.stringify(summary, null, 2);
    }
  </script>

    window.StoryRegexUI.dom = {
      escapeHtml(value) {
        const div = document.createElement('div');
        div.textContent = String(value ?? '');
        return div.innerHTML;
      },
      createElement(tag, options = {}) {
        const el = document.createElement(tag);
        if (options.className) el.className = options.className;
        if (options.html) el.innerHTML = options.html;
        return el;
      }
    };
    window.StoryRegexUI.theme = {
      getTheme() { return document.body.classList.contains('night') ? 'night' : 'day'; },
      applyTheme(node) {}
    };
    window.StoryRegexUI.registry = {
      register(module) {
        window.__dbModule = module;
        console.log('[Preview] Module registered:', module.id, module.version);
      }
    };
  </script>

  <script>
    // === Render & Controls ===
    function render() {
      const module = window.__dbModule;
      if (!module) { console.error('Module not registered!'); return; }
      const node = module.renderContent('', {});
      const container = document.getElementById('container');
      container.innerHTML = '';
      container.appendChild(node);
      module.mount(container, {});
      // Update debug panels after render
      setTimeout(showGameState, 100);
    }

    function toggleTheme() {
      document.body.classList.toggle('night');
      const btn = document.getElementById('themeBtn');
      btn.textContent = document.body.classList.contains('night') ? '切换日间模式' : '切换夜间模式';
      btn.classList.toggle('active', document.body.classList.contains('night'));
      render();
    }

    function reloadData() {
      traceCall('reloadData (manual)');
      if (window.__dbUpdateCallback) {
        window.__dbUpdateCallback();
      } else {
        render();
      }
    }

    function simulateUpdate() {
      traceCall('simulateUpdate');
      // Simulate a data change: advance time
      const globalContent = MOCK_TABLES.sheet_global.content;
      globalContent[1][1] = '2018年10月15日 16:00 (周一)';
      globalContent[1][4] = '5小时';
      // Simulate cursed energy consumption
      const statsContent = MOCK_TABLES.sheet_protag_stats.content;
      statsContent[1][9] = 500; // cursed energy current drops
      // Trigger update callback
      if (window.__dbUpdateCallback) {
        window.__dbUpdateCallback();
      } else {
        render();
      }
      renderDbState(MOCK_TABLES);
    }

    // Initial render
    render();
    renderDbState(MOCK_TABLES);
  </script>
